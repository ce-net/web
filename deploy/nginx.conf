# CE web — nginx for the relay (178.105.145.170). Cloudflare terminates TLS (Flexible),
# origin speaks HTTP on :80. Installs as /etc/nginx/sites-available/ce (the active config).
#
# Preserves the relay's deliberately minimal, READ-ONLY public surface: only /bootstrap,
# /health, and the SSE streams are proxied to the node (:8844). The value-moving API stays
# localhost-bound + token-gated on the node and is never exposed here. This file only ADDS a
# static landing page at / and the docs subdomain — unknown paths still 404.

# WebSocket upgrade plumbing for the browser-node hub (valid at http{} include scope).
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# --- ce-net.com (default): landing page + read-only node surface --------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ce-net.com relay.ce-net.com _;

    root /var/www/ce-net;
    index index.html;

    # SSE push streams (read-only) — buffering off or the client never gets events.
    location ~ ^/(signals/stream|blocks/stream|transactions/stream) {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    location = /bootstrap {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844/bootstrap;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location = /health {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844/health;
        add_header Access-Control-Allow-Origin *;
    }

    # installer scripts the landing's commands fetch (outbound proxy to GitHub raw).
    location = /install.sh  { proxy_pass https://raw.githubusercontent.com/ce-net/ce/main/install.sh; }
    location = /install.ps1 { proxy_pass https://raw.githubusercontent.com/ce-net/ce/main/install.ps1; }

    # browser-node hub: WebSocket node registration, task dispatch, live stats (SSE).
    # Separate sidecar service on :8970 — does NOT touch the ce node's surface.
    location /hub/ {
        proxy_pass http://127.0.0.1:8970/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # static landing + extensionless pages (/node -> node.html, /network -> network.html).
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
}

# --- docs.ce-net.com: static docs ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name docs.ce-net.com;

    root /var/www/ce-docs;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }
}
