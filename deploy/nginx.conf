# CE web — nginx for the relay (178.105.145.170). Cloudflare terminates TLS (Flexible),
# origin speaks HTTP on :80. Installs as /etc/nginx/sites-available/ce (the active config).
#
# Preserves the relay's deliberately minimal, READ-ONLY public surface: only /bootstrap,
# /health, and the SSE streams are proxied to the node (:8844). The value-moving API stays
# localhost-bound + token-gated on the node and is never exposed here. This file only ADDS a
# static landing page at / and the docs subdomain — unknown paths still 404.

# WebSocket upgrade plumbing for the browser-node hub (valid at http{} include scope).
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

# Map a public request path to its ce-storage object key (no `if` — `if` breaks error_page
# fallback inside location). `/` -> index.html, extensionless -> .html, else verbatim.
map $uri $ce_skey {
    default    $uri;
    ~^/$       /index.html;
    ~^/[^.]+$  "${uri}.html";
}

# --- ce-net.com (default): landing page + read-only node surface --------------------
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name ce-net.com relay.ce-net.com _;

    root /var/www/ce-net;
    index index.html;

    # SSE push streams (read-only) — buffering off or the client never gets events.
    location ~ ^/(signals/stream|blocks/stream|transactions/stream) {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        add_header X-Accel-Buffering no;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    location = /bootstrap {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844/bootstrap;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    location = /health {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844/health;
        add_header Access-Control-Allow-Origin *;
    }

    # read-only mesh capacity + node status (public, GET-only) — powers the /fabric size dashboard.
    location = /atlas {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844/atlas;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }
    location = /status {
        limit_except GET { deny all; }
        proxy_pass http://127.0.0.1:8844/status;
        proxy_set_header Host $host;
        add_header Access-Control-Allow-Origin *;
    }

    # installer scripts the landing's commands fetch (outbound proxy to GitHub raw).
    location = /install.sh  { proxy_pass https://raw.githubusercontent.com/ce-net/ce/main/install.sh; }
    location = /install.ps1 { proxy_pass https://raw.githubusercontent.com/ce-net/ce/main/install.ps1; }

    # browser-node hub: WebSocket node registration, task dispatch, live stats (SSE).
    # Separate sidecar service on :8970 — does NOT touch the ce node's surface.
    location /hub/ {
        proxy_pass http://127.0.0.1:8970/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # CE APP PLATFORM — public surface for hub-hosted apps, the namespaced KV database,
    # and realtime rooms. All proxy to the ce-hub sidecar (:8970). These MUST come before
    # the catch-all "location /" so /apps/, /db/, /rt/ resolve to the hub, not ce-storage.

    # App hosting: multi-file static sites + SPAs at https://ce-net.com/apps/<id>/.
    # WebSocket upgrade is reused for completeness; buffering is off so the per-app
    # __reload SSE stream (hot reload) flushes immediately and never buffers.
    location /apps/ {
        proxy_pass http://127.0.0.1:8970/apps/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # CE database: persistent KV namespaced per app — /db/<app>/<key>.
    location /db/ {
        proxy_pass http://127.0.0.1:8970/db/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Realtime rooms: pub/sub over WebSocket — wss://ce-net.com/rt/<app>/<room>.
    location /rt/ {
        proxy_pass http://127.0.0.1:8970/rt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # Note: the CE platform write/registry API (POST /projects, /slugs, GET /registry) is reached via
    # the /hub proxy above, NOT apex routes — an apex `location /projects` would shadow the static
    # /projects gallery page (GET) and proxy it to the POST-only API. The CLI (ce-app publish/slug)
    # and the registry pages target /hub/* accordingly.

    # ce-net.com is served like ANY other CE-hosted site: its pages are content-addressed
    # CE blobs served by the ce-storage gateway (:9000) — the same app any user runs
    # (`ce-storage gateway`). nginx is only the TLS-terminated front Cloudflare requires.
    # On any gateway hiccup we fall back to the local static copy, so there is zero downtime.
    location / {
        proxy_intercept_errors on;
        error_page 404 500 502 503 504 = @static;
        proxy_pass http://127.0.0.1:9000/ce-net-site$ce_skey;
        proxy_set_header Host $host;
        add_header X-CE-Served "ce-storage-gateway" always;
    }

    # zero-downtime fallback: the same static files, served directly if the gateway is unavailable.
    location @static {
        add_header X-CE-Served "static-fallback" always;
        try_files $uri $uri.html $uri/ =404;
    }
}

# --- docs.ce-net.com: static docs ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name docs.ce-net.com;

    root /var/www/ce-docs;
    index index.html;

    location / { try_files $uri $uri/ /index.html; }
}

# --- *.ce-net.com: per-developer app subdomains -------------------------------------
# Maps <id>.ce-net.com -> the hub-hosted app <id>, so a developer's public dev domain is
# their app id. Exact names (ce-net.com, relay., docs.) win over this regex, so only bare
# subdomains are caught. INERT until a wildcard record `*.ce-net.com -> relay (proxied)`
# exists in Cloudflare (Universal SSL already covers one-level *.ce-net.com). An app's own
# /db, /rt and /apps calls keep working on the subdomain so its database + realtime resolve.
server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<appid>[a-z0-9][a-z0-9-]*)\.ce-net\.com$;

    location /db/ {
        proxy_pass http://127.0.0.1:8970/db/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /rt/ {
        proxy_pass http://127.0.0.1:8970/rt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
    location /apps/ {
        proxy_pass http://127.0.0.1:8970/apps/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
    # everything else on the subdomain serves the app's files (index.html at /).
    location / {
        proxy_pass http://127.0.0.1:8970/apps/$appid$uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
}

# --- custom production domains (customer-owned, CNAME'd to ce-net.com) ----------------
# A customer points their own domain (e.g. app.acme.com) at ce-net.com with a CNAME. The
# request arrives here with Host: app.acme.com. We route it to the hub's /_host endpoint and
# pass the ORIGINAL Host through as X-CE-Host, which the hub uses to resolve the registered
# app id (PUT /apps/:id/domain) and serve its files with SPA fallback. Unregistered hosts get
# the hub's 404 JSON.
#
# server_name precedence (nginx evaluates: exact > wildcard > regex-in-file-order > default):
#   - Exact names (ce-net.com, relay.ce-net.com, docs.ce-net.com) win first.
#   - The *.ce-net.com regex block appears ABOVE this one, so any *.ce-net.com host matches it,
#     not this block. The negative lookahead `(?!.*\.ce-net\.com$)` is belt-and-suspenders so a
#     ce-net.com host can never fall through here even if block order ever changes.
#   - This regex matches any other dotted hostname (a real customer domain). Truly unknown /
#     bare hosts still fall to the apex `default_server`, so nothing else changes.
server {
    listen 80;
    listen [::]:80;
    # Quoted: the regex contains `{2,}`, and unquoted `{` would be read as a block start by nginx.
    server_name "~^(?!.*\.ce-net\.com$)(?<cehost>[a-z0-9._-]+\.[a-z]{2,})$";

    # An app's database + realtime must keep working on its custom domain exactly as on the
    # subdomain, so /db, /rt and /apps resolve to the hub before the catch-all below.
    location /db/ {
        proxy_pass http://127.0.0.1:8970/db/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
    location /rt/ {
        proxy_pass http://127.0.0.1:8970/rt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
    location /apps/ {
        proxy_pass http://127.0.0.1:8970/apps/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # Everything else on the custom domain serves the resolved app's files via the hub's
    # host-routed endpoint. The hub maps X-CE-Host -> app id and applies SPA fallback.
    location / {
        proxy_pass http://127.0.0.1:8970/_host$uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-CE-Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
}
