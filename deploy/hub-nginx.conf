# CE web — nginx server block for hub.ce-net.com (the git layer of web/ce-hub on :8970).
# Cloudflare terminates TLS (Flexible); origin speaks HTTP on :80. Install ALONGSIDE the main
# nginx.conf as /etc/nginx/sites-available/ce-hub, symlinked into sites-enabled, then reload.
#
# This routes the hub UI (/), the git smart-HTTP wire (/git/), and the JSON repo API (/repos/)
# to the same ce-hub sidecar the apex already proxies for /apps, /db, /rt. The exact, named
# host hub.ce-net.com wins over the apex default_server and the *.ce-net.com regex block in
# nginx.conf (nginx precedence: exact > wildcard > regex-in-order > default_server).
#
# The `map $http_upgrade $connection_upgrade { ... }` used below for /rt is already declared at
# http{} scope in nginx.conf, so it is NOT redeclared here (redeclaring it is a config error).

server {
    listen 80;
    listen [::]:80;
    server_name hub.ce-net.com;

    # GIT SMART-HTTP — the critical, easy-to-get-wrong block.
    #   - proxy_buffering off: git-upload-pack / git-receive-pack stream packfiles; with
    #     buffering on, nginx stalls clones/pushes and large fetches hang or time out.
    #   - proxy_request_buffering off: stream the push body straight to ce-hub -> git-receive-pack
    #     instead of spooling the whole pack to a temp file first.
    #   - client_max_body_size 2g: a push pack can be large; the default 1m would 413 real pushes.
    #     Keep this in step with CE_HUB_MAX_GIT_BYTES in ce-hub.service.
    #   - long read timeout: a big clone or a server-side repack can take a while.
    #   - http_version 1.1 + Connection "": keep-alive to the upstream, no chunk surprises.
    location /git/ {
        proxy_pass http://127.0.0.1:8970/git/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 2g;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    # JSON repo registry + gix read API + pulls + instances.
    location /repos/ {
        proxy_pass http://127.0.0.1:8970/repos/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 16m;
    }
    # exact /repos (list, no trailing slash) — proxy too so it does not fall to the UI catch-all.
    location = /repos {
        proxy_pass http://127.0.0.1:8970/repos;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # PR comment thread live updates ride the existing realtime rooms. WebSocket upgrade on.
    location /rt/ {
        proxy_pass http://127.0.0.1:8970/rt/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }

    # The hub's KV database backs PR records + comments (keyed by repo:<owner>/<repo>).
    location /db/ {
        proxy_pass http://127.0.0.1:8970/db/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # The slug registry: claiming an <owner> handle for repos.
    location /slugs/ {
        proxy_pass http://127.0.0.1:8970/slugs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # The hub UI (browse code, diffs, releases, instances, PRs) — a hub-hosted SPA. Everything
    # not matched above serves the UI from the hub. WebSocket upgrade reused so the SPA's
    # __reload / live channels flush immediately; buffering off for the same reason.
    location / {
        proxy_pass http://127.0.0.1:8970/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
    }
}
