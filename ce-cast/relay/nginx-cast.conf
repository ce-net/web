# cast.ce-net.com — ce-cast MEDIA relay signaling endpoint (WHIP publish + WHEP read) only.
#
# The UI + control plane live at the app's OWN origin (cast-<prefix>.ce-net.com), served by the hub
# app-subdomain vhost, which provides the same-origin `/ce` node proxy generically for every app.
# This vhost reverse-proxies WHIP/WHEP to MediaMTX on localhost and answers CORS preflight so the
# app (a different origin) can reach the media plane.
#
# Cloudflare (proxied) terminates TLS and forwards HTTP to :80 here. WebRTC MEDIA is direct
# UDP to the public IP on :8189 (Cloudflare can't carry UDP) — opened separately in UFW.
#
# Install: /etc/nginx/sites-available/cast -> symlink into sites-enabled, nginx -t, reload.

server {
    listen 80;
    listen [::]:80;
    server_name cast.ce-net.com;

    # WHIP publish (Mac: cam/screen, phone: program) + WHEP read (phone pulls cam/screen).
    location ~ ^/(cam|screen|program)(/.*)?$ {
        # CORS preflight: the app posts SDP with an Authorization header from another origin.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "POST, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, If-Match" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }
        # MediaMTX ALSO emits its own CORS headers. Two Access-Control-Allow-Origin headers make
        # browsers reject the response ("Load failed"), so strip MediaMTX's and emit exactly one.
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Access-Control-Expose-Headers "Location, ETag, Link" always;

        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_request_buffering off;
        client_max_body_size 1m;
    }

    # HLS preview of the composited program (written by cast-agent's ffmpeg). CORS so the
    # control UI (hosted on the CE hub, a different origin) can play it.
    location /hls/ {
        alias /opt/ce-cast/relay/hls/;
        add_header Access-Control-Allow-Origin "$http_origin" always;
        add_header Cache-Control no-cache always;
        types { application/vnd.apple.mpegurl m3u8; video/mp2t ts; }
    }

    # ce-link one-command device onboarding: curl -fsSL cast.ce-net.com/link | sh
    # Served straight off disk here (reliable, no-cache) instead of the app platform.
    location = /link { alias /opt/ce-cast/relay/ce-link-get.sh; default_type text/plain; add_header Cache-Control "no-store" always; }
    location = /ce-link.txt { alias /opt/ce-cast/relay/ce-link.txt; default_type text/plain; add_header Cache-Control "no-store" always; }

    # shared clipboard: curl -fsSL cast.ce-net.com/clip | sh
    location = /clip { alias /opt/ce-cast/relay/clip-get.sh; default_type text/plain; add_header Cache-Control "no-store" always; }
    location = /clip.txt { alias /opt/ce-cast/relay/clip.txt; default_type text/plain; add_header Cache-Control "no-store" always; }

    # The UI + mesh control plane live at the app's own origin (cast-c0be11e0ce.ce-net.com, served
    # by the hub app-subdomain vhost which now provides the same-origin /ce node proxy). This vhost
    # is pure MEDIA signaling again — nothing else is public here.
    location / { return 404; }
}
