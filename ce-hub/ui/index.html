<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ce-hub — open-source git for ce-net</title>
<meta name="description" content="hub.ce-net.com — distributed, open-source-only git for ce-net. Browse repos, diffs, releases, live instances and pull requests." />
<meta name="theme-color" content="#03060e" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233b82ff'/%3E%3Cstop offset='1' stop-color='%236ff0e6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cg fill='none' stroke='url(%23g)' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3Cpath d='M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div class="sea" aria-hidden="true">
    <div class="surface"></div>
    <div class="deepglow"></div>
    <div class="grain"></div>
  </div>

  <div class="shell">
    <nav>
      <div class="wrap row">
        <a class="brand" href="#/">
          <svg viewBox="0 0 32 32" aria-hidden="true"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b82ff"/><stop offset="1" stop-color="#6ff0e6"/></linearGradient></defs><g fill="none" stroke="url(#bg)" stroke-width="2.4" stroke-linecap="round"><path d="M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/><path d="M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/></g></svg>
          <span><span class="ce">ce</span>-hub</span>
        </a>
        <div class="links">
          <a href="#/">Repositories</a>
          <a href="https://ce-net.com" target="_blank" rel="noopener">ce-net</a>
        </div>
        <div class="spacer"></div>
        <div class="globalsearch">
          <input id="navsearch" type="search" placeholder="Search repositories" autocomplete="off" />
        </div>
      </div>
    </nav>

    <main id="view" class="wrap"><!-- router renders here --></main>

    <footer>
      <div class="wrap">
        <span>hub.ce-net.com</span>
        <span class="dot">/</span>
        <span>open source only. every repo public, diff-tracked, forkable.</span>
      </div>
    </footer>
  </div>

  <script src="./api.js"></script>
  <script src="./highlight.js"></script>
  <script src="./diff.js"></script>
  <script src="./sign.js"></script>
  <script src="./app.js"></script>
</body>
</html>
