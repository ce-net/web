<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>Cursor Party — live shared cursors on the CE mesh</title>
<meta name="theme-color" content="#03060e" />
<meta name="description" content="Everyone's cursor, flying around one shared space, live — authoritatively simulated by the game-cursors backend on the CE mesh. Move, click to ripple." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M7 5l16 9-7 2-2 7z' fill='%2337c6ff'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..700;1,9..144,500..600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#03060e;--deep:#070d18;--panel:#0a1422;--line:rgba(116,176,255,.13);--line-2:rgba(116,176,255,.07);
  --text:#e9f1fb;--muted:#92a8c6;--faint:#5e768f;--blue:#3b82ff;--cyan:#37c6ff;--surf:#7af0ff;--ok:#43e0a0;--bad:#ff5d72;--gold:#ffd166;
  --grad:linear-gradient(118deg,#2f6bff,#37c6ff 56%,#7af0e6);--display:"Fraunces",serif;--body:"Hanken Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none}
body{background:var(--abyss);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;touch-action:none;cursor:none}
#field{position:fixed;inset:0;z-index:0;background:radial-gradient(70% 50% at 50% -10%,rgba(55,198,255,.12),transparent 60%),radial-gradient(50% 40% at 90% 110%,rgba(47,107,255,.12),transparent 60%)}
#grid{position:fixed;inset:0;z-index:0;opacity:.5;background-image:linear-gradient(rgba(116,176,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(116,176,255,.05) 1px,transparent 1px);background-size:40px 40px}
.hud{position:fixed;z-index:5;top:14px;left:14px;display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;background:rgba(10,20,34,.7);backdrop-filter:blur(8px);padding:9px 13px}
.brand{font-family:var(--display);font-weight:600;font-size:16px}.brand .ce{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.cnt{position:fixed;z-index:5;top:14px;right:14px;display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:12px;background:rgba(10,20,34,.7);backdrop-filter:blur(8px);padding:9px 14px;font-family:var(--mono);font-size:14px;color:var(--muted)}
.dot{width:9px;height:9px;border-radius:50%;background:var(--ok);position:relative}
.dot.off{background:var(--bad)}
.dot::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:0 0 0 2px rgba(67,224,160,.5);animation:p 2s infinite}
.dot.off::after{box-shadow:0 0 0 2px rgba(255,93,114,.5);animation:none}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(67,224,160,.5)}100%{box-shadow:0 0 0 10px rgba(67,224,160,0)}}
.cnt b{color:var(--text);font-weight:600;font-size:18px}
.tip{position:fixed;z-index:5;bottom:18px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:12.5px;color:var(--faint);text-align:center;pointer-events:none;width:90%}
.tip span{color:var(--cyan)}
#cv{position:fixed;inset:0;z-index:1}
.cursor{position:fixed;z-index:3;left:0;top:0;pointer-events:none;will-change:transform;transition:transform .09s linear}
.cursor svg{display:block;filter:drop-shadow(0 1px 4px rgba(0,0,0,.5))}
.cursor .name{position:absolute;left:16px;top:14px;font-family:var(--mono);font-size:11.5px;font-weight:500;padding:2px 8px;border-radius:7px;white-space:nowrap;color:#02101a}
.namebox{position:fixed;z-index:6;bottom:18px;right:18px;display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;background:rgba(10,20,34,.8);backdrop-filter:blur(8px);padding:7px 10px}
.namebox span{font-family:var(--mono);font-size:11px;color:var(--faint)}
.namebox input{background:#060b14;border:1px solid var(--line);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:6px 9px;width:120px;outline:none}
.namebox input:focus{border-color:rgba(55,198,255,.45)}
.namebox .me{width:16px;height:16px;border-radius:5px}
.foot{position:fixed;z-index:5;bottom:14px;left:14px;font-family:var(--mono);font-size:11px;color:var(--faint);max-width:46%}
.foot code{color:var(--muted)}
</style>
</head>
<body>
<div id="field"></div><div id="grid"></div>
<canvas id="cv"></canvas>
<div class="hud"><div class="brand"><span class="ce">CE</span> Cursor Party</div></div>
<div class="cnt"><span class="dot" id="dot"></span><b id="liveN">0</b>&nbsp;<span id="liveL">here now</span></div>
<div class="tip">Move your cursor. <span>Click anywhere</span> to send a ripple. The world is cut into sectors — each authoritatively simulated by a different <code>game-cursors</code> node on the CE mesh. You only receive the sectors near you (interest management).</div>
<div class="namebox"><div class="me" id="meSw"></div><span>you</span><input id="nameIn" maxlength="12" placeholder="name" /></div>
<div class="foot" id="foot">connecting to your local CE node…</div>

<script type="module">
"use strict";

/* ============================================================================
   CE MESH BRIDGE — talk to the local CE node over the SAME ORIGIN only.

   cursors is server-authoritative. The shared world does NOT run in this
   browser — it runs in the `game-cursors` Rust backend hosting this room on the
   CE mesh. This client ONLY sends its own cursor input and renders the
   authoritative snapshots it receives.

   Transport: the same-origin CE node bridge.
     * window.__ceNode  — the in-browser WASM node (request()/stream()), if present
     * else "/ce"       — the same-origin node proxy the hub mounts
   We use the node's mesh app-messaging surface:
     POST /mesh/subscribe          { topic }
     POST /mesh/publish            { topic, payload_hex }
     GET  /mesh/messages/stream    SSE of inbound { from, topic, payload_hex, ... }

   STRICT SAME-ORIGIN: this file never contacts ce-net.com, /db, /rt, /nodes,
   /stats, or any remote origin. Everything goes through the local node.
   ============================================================================ */

const APP_PREFIX = "ce-game/cursors";
const ROOM = "main";
const HZ = 30; // client input publish rate; the backend ticks authoritatively at its own hz.

/* Sharded world: the backend cuts [0,1]² into a GRID×GRID lattice of sectors, each hosted
   (rendezvous-hashed) by a different mesh node. A client uses INTEREST MANAGEMENT: it only
   subscribes to the sectors in its 3×3 neighbourhood and publishes input only to its current
   sector — so traffic scales with local density, not the global population. GRID must match
   `shard::GRID` in the backend. */
const GRID = 8;
const inTopic    = (room) => `${APP_PREFIX}/${room}/in`;
const stateTopic = (room) => `${APP_PREFIX}/${room}/state`;
const sectorInTopic    = (room, s) => `${APP_PREFIX}/${room}/s${s}/in`;
const sectorStateTopic = (room, s) => `${APP_PREFIX}/${room}/s${s}/state`;

/* The sector containing a normalized [0,1] position (mirrors shard::Sector::at). */
function sectorAt(nx, ny){
  const clamp = (v)=> Number.isFinite(v) ? Math.min(0.999999, Math.max(0, v)) : 0;
  const gx = Math.min(GRID-1, Math.floor(clamp(nx)*GRID));
  const gy = Math.floor(clamp(ny)*GRID);
  return gy*GRID + gx;
}
/* The 3×3 interest neighbourhood of a sector (mirrors shard::Sector::interest), edge-clamped. */
function interestOf(s){
  const c = s % GRID, r = (s - c)/GRID, out = [];
  for(let dr=-1; dr<=1; dr++) for(let dc=-1; dc<=1; dc++){
    const nc=c+dc, nr=r+dr;
    if(nc>=0 && nc<GRID && nr>=0 && nr<GRID) out.push(nr*GRID+nc);
  }
  return out;
}

const enc = new TextEncoder();
const dec = new TextDecoder();
function toHex(bytes){ let h=""; for(const b of bytes) h += b.toString(16).padStart(2,"0"); return h; }
function fromHex(hex){ const n=hex.length>>1, out=new Uint8Array(n); for(let i=0;i<n;i++) out[i]=parseInt(hex.substr(i*2,2),16); return out; }

/* Build a fetch-shaped caller + SSE opener over the chosen same-origin bridge. */
function makeBridge(){
  const node = (typeof window !== "undefined") ? window.__ceNode : null;
  if (node && typeof node.request === "function"){
    return {
      kind: "node",
      async post(path, jsonBody){
        const r = await node.request({ method:"POST", path, jsonBody, headers:{"content-type":"application/json"}, signal:(new AbortController()).signal });
        return (r && typeof r.status === "number") ? r.status : 0;
      },
      stream(path, signal){
        if (typeof node.stream !== "function") return null;
        return node.stream(path, signal); // yields decoded `data:` payload strings
      },
    };
  }
  // Same-origin "/ce" proxy fallback. NEVER an absolute/remote URL.
  const BASE = "/ce";
  return {
    kind: "proxy",
    async post(path, jsonBody){
      try{
        const r = await fetch(BASE + path, { method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(jsonBody) });
        return r.status;
      }catch(_){ return 0; }
    },
    stream(path, signal){ return sseLines(BASE + path, signal); },
  };
}

/* Minimal SSE reader for the "/ce" proxy path: yields decoded `data:` payloads. */
async function* sseLines(url, signal){
  const r = await fetch(url, { headers:{ "accept":"text/event-stream", "cache-control":"no-cache" }, signal });
  if (!r.ok || !r.body) throw new Error("sse open failed: " + r.status);
  const reader = r.body.getReader();
  let buf = "";
  for(;;){
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream:true });
    let idx;
    while((idx = buf.indexOf("\n\n")) >= 0){
      const frame = buf.slice(0, idx); buf = buf.slice(idx+2);
      const lines = frame.split("\n");
      const data = lines.filter(l=>l.startsWith("data:")).map(l=>l.slice(5).replace(/^ /,"")).join("\n");
      if (data) yield data;
    }
  }
}

/*
  createMeshGame — the client side of the sharded cursors mesh app.

    * INTEREST MANAGEMENT: tracks the client's current sector (from sectorFn()) and
      subscribes only to the state topics of its 3×3 interest neighbourhood, plus the
      whole-room state topic as a single-node fallback. As the client crosses sector
      boundaries it subscribes to newly-relevant sectors (old ones simply stop arriving).
    * publishes {t:"in"} input frames at HZ to its CURRENT sector's input topic (and the
      whole-room input topic as fallback), and {t:"bye"} on leave.
    * MERGES the per-sector {t:"st"} snapshots it receives into one view by last-snapshot-
      wins per sector, then unions the cursors/ripples, and calls onState(merged, meta).

  No election, no /db, no /nodes — each snapshot names its authoritative host (and the
  sector it owns); we just render the normalized state the sector hosts send.
*/
function createMeshGame(opts){
  const O = opts || {};
  const room    = O.room || ROOM;
  const id      = O.id;
  const hz      = O.hz || HZ;
  const inputFn = O.input  || (()=>null);
  const sectorFn= O.sector || (()=>0);
  const onState = O.onState|| (()=>{});
  const onStatus= O.onStatus || (()=>{});

  const bridge = makeBridge();
  const ROOM_ST = stateTopic(room), ROOM_IN = inTopic(room);

  let connected = false, leftRoom = false, curHost = null;
  let lastTick = 0, lastSeq = 0, lastStateMs = 0, mySeq = 0;
  const abort = new AbortController();

  // Per-sector latest snapshot we currently care about: sector -> {state, host, tick, ts, rxMs}.
  const sectorState = new Map();
  // Topics we've asked the node to subscribe us to (so we don't re-subscribe each pass).
  const subscribed = new Set();
  // The set of sector STATE topics we currently want (recomputed from the interest set).
  let wantTopics = new Set([ROOM_ST]);

  function setStatus(ok, text){ connected = ok; try{ onStatus(ok, text); }catch(_){} }

  function curSector(){ try{ return sectorFn(); }catch(_){ return 0; } }

  /* Recompute the interest set from the current sector and subscribe to anything new. */
  async function ensureSubscribed(){
    const want = new Set([ROOM_ST, ROOM_IN]);
    for(const s of interestOf(curSector())) want.add(sectorStateTopic(room, s));
    wantTopics = new Set([...want].filter(t => t.endsWith("/state")));
    for(const topic of want){
      if(subscribed.has(topic)) continue;
      const st = await bridge.post("/mesh/subscribe", { topic });
      if(st === 0 || st === 200 || st === 204) subscribed.add(topic);
    }
  }

  async function publishInput(){
    if (leftRoom) return;
    let inp; try{ inp = inputFn(); }catch(_){ inp = null; }
    if (inp == null) return;
    mySeq++;
    const frame = toHex(enc.encode(JSON.stringify({ t:"in", id, seq:mySeq, input: inp })));
    // Publish to my current sector (the host that owns the cursors I'm among) AND the whole-room
    // input topic, so the demo works whether the backend runs sharded or whole-room.
    const sec = sectorAt((inp.x||0)/(inp.w||1), (inp.y||0)/(inp.h||1));
    await bridge.post("/mesh/publish", { topic: sectorInTopic(room, sec), payload_hex: frame });
    await bridge.post("/mesh/publish", { topic: ROOM_IN, payload_hex: frame });
  }

  async function sayBye(){
    const frame = toHex(enc.encode(JSON.stringify({ t:"bye", id })));
    try{
      await bridge.post("/mesh/publish", { topic: sectorInTopic(room, curSector()), payload_hex: frame });
      await bridge.post("/mesh/publish", { topic: ROOM_IN, payload_hex: frame });
    }catch(_){}
  }

  /* Merge the per-sector snapshots we currently hold into one view and emit it. */
  function emitMerged(){
    const cursors = {}, ripples = [];
    let online = 0, freshHost = curHost, newestTs = 0, sectors = 0;
    const nowMs = Date.now();
    for(const [sec, snap] of sectorState){
      // Drop sectors we haven't heard from in a while (host gone / moved out of interest).
      if(nowMs - snap.rxMs > 3000){ sectorState.delete(sec); continue; }
      sectors++;
      const st = snap.state || {};
      for(const pid in (st.cursors||{})) cursors[pid] = st.cursors[pid];
      for(const r of (st.ripples||[])) ripples.push(r);
      online += st.cursors ? Object.keys(st.cursors).length : 0;
      if(snap.ts >= newestTs){ newestTs = snap.ts; if(snap.host) freshHost = snap.host; }
    }
    curHost = freshHost;
    const rtt = newestTs ? Math.max(0, nowMs - newestTs) : 0;
    try{
      onState({ cursors, ripples }, {
        host: curHost, hostShort: shortOf(curHost),
        online, tick: lastTick, seq: lastSeq, rttToHostMs: rtt, sectors,
      });
    }catch(_){}
  }

  function handleSnapshot(env, msg){
    if (!msg || msg.t !== "st" || !msg.state) return;
    lastStateMs = Date.now();
    lastTick = msg.tick || 0; lastSeq = msg.seq || 0;
    // Key by the sector the snapshot is authoritative for; whole-room snapshots use -1.
    const sec = (typeof msg.sector === "number") ? msg.sector : -1;
    sectorState.set(sec, {
      state: msg.state, host: msg.host || null,
      tick: msg.tick||0, ts: (typeof msg.ts==="number"?msg.ts:Date.now()), rxMs: Date.now(),
    });
    emitMerged();
  }

  /* Inbound mesh message pump: SSE of {from, topic, payload_hex}. Reconnects. */
  async function pump(){
    while(!leftRoom){
      try{
        setStatus(false, "connecting to the mesh…");
        await ensureSubscribed();
        const it = bridge.stream("/mesh/messages/stream", abort.signal);
        if (!it){ throw new Error("node bridge exposes no message stream"); }
        setStatus(true, "connected to the mesh");
        for await (const data of it){
          if (leftRoom) break;
          let env; try{ env = JSON.parse(data); }catch(_){ continue; }
          if (!env || !env.topic || !env.payload_hex) continue;
          // Accept the whole-room state topic and any sector state topic in our interest set.
          if (env.topic !== ROOM_ST && !wantTopics.has(env.topic)) continue;
          let body; try{ body = JSON.parse(dec.decode(fromHex(env.payload_hex))); }catch(_){ continue; }
          handleSnapshot(env, body);
        }
      }catch(_){
        setStatus(false, "offline — start a local CE node and the game-cursors backend");
      }
      if (leftRoom) break;
      await new Promise(r=>setTimeout(r, 800)); // backoff then reconnect
    }
  }

  const inputTimer = setInterval(()=>{ void publishInput(); }, 1000/hz);
  const subTimer = setInterval(()=>{ void ensureSubscribed(); }, 2000); // re-check interest set
  void pump();

  function shortOf(cid){ if(!cid) return "—"; const m=String(cid); return m.length>8 ? m.slice(0,8) : m; }

  if (typeof window !== "undefined"){
    window.addEventListener("beforeunload", ()=>{ try{ sayBye(); }catch(_){} });
  }

  return {
    online(){ return connected; },
    hostId(){ return curHost; },
    hostShort(){ return shortOf(curHost); },
    tick(){ return lastTick; },
    sector(){ return curSector(); },
    sectorsSeen(){ return sectorState.size; },
    hostAlive(){ return !!curHost && (Date.now() - lastStateMs) < 2000; },
    leave(){
      leftRoom = true;
      clearInterval(inputTimer); clearInterval(subTimer);
      try{ abort.abort(); }catch(_){}
      void sayBye();
    },
  };
}

/* ============================================================================
   PRESENTATION — local identity, input capture, and rendering the snapshot.
   ============================================================================ */

const id = (localStorage.ce_id ||= Math.random().toString(36).slice(2,10));
const COLORS=["#37c6ff","#43e0a0","#ffd166","#ff5d72","#7af0e6","#3b82ff","#ff9d4d","#a78bfa","#7ef0bd","#ff8fa3"];
const myColor=COLORS[[...id].reduce((a,c)=>a+c.charCodeAt(0),0)%COLORS.length];
let myName=(localStorage.ce_name||("guest-"+id.slice(0,3)));

document.getElementById("meSw").style.background=myColor;
const nameIn=document.getElementById("nameIn"); nameIn.value=myName;
nameIn.oninput=()=>{ myName=nameIn.value.slice(0,12)||("guest-"+id.slice(0,3)); localStorage.ce_name=myName; };

/* canvas ripples (driven by authoritative snapshots, keyed so each fires once) */
const cv=document.getElementById("cv"), ctx=cv.getContext("2d");
function size(){ cv.width=innerWidth*devicePixelRatio; cv.height=innerHeight*devicePixelRatio; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
size(); addEventListener("resize",size);
const ripples=[];                 // local visual ripples
const seenRipples=new Set();      // dedupe authoritative ripples we've already started
function ripple(x,y,c){ ripples.push({x,y,c,r:2,a:1}); }
function frame(){
  ctx.clearRect(0,0,innerWidth,innerHeight);
  for(let i=ripples.length-1;i>=0;i--){
    const r=ripples[i]; r.r+=3.2; r.a-=0.018;
    if(r.a<=0){ ripples.splice(i,1); continue; }
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,7); ctx.strokeStyle=r.c; ctx.globalAlpha=r.a; ctx.lineWidth=2.5; ctx.stroke();
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r*.55,0,7); ctx.globalAlpha=r.a*.5; ctx.lineWidth=1.4; ctx.stroke();
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(frame);
}
frame();

/* cursor SVG factory */
function cursorSVG(c){ return "<svg width='26' height='26' viewBox='0 0 26 26'><path d='M5 3l16 9-7 1.6-2.4 7z' fill='"+c+"' stroke='#02101a' stroke-width='1.2' stroke-linejoin='round'/></svg>"; }

/* my own cursor element follows the mouse instantly (local prediction of pointer);
   the authoritative snapshot still includes me, but rendering my own pointer locally
   keeps it lag-free. */
const meEl=document.createElement("div"); meEl.className="cursor"; meEl.style.transition="none";
meEl.innerHTML=cursorSVG(myColor)+"<div class='name' style='background:"+myColor+"'></div>";
document.body.appendChild(meEl);
function paintMyName(){ meEl.querySelector(".name").textContent=myName; }
paintMyName(); nameIn.addEventListener("input",paintMyName);

let mx=innerWidth/2, my=innerHeight/2, moved=false, wantClick=false;
function moveSelf(x,y){ mx=x; my=y; moved=true; meEl.style.transform="translate("+x+"px,"+y+"px)"; }
addEventListener("pointermove",e=>moveSelf(e.clientX,e.clientY));
addEventListener("pointerdown",e=>{ moveSelf(e.clientX,e.clientY); wantClick=true; ripple(e.clientX,e.clientY,myColor); });
moveSelf(mx,my);

/* peers: rendered from the authoritative snapshot, lerped toward target positions */
const peers=new Map(); // id -> {el,x,y,tx,ty,name,color}
function ensurePeer(pid,name,color){
  let p=peers.get(pid);
  if(!p){
    const el=document.createElement("div"); el.className="cursor";
    el.innerHTML=cursorSVG(color)+"<div class='name' style='background:"+color+"'></div>";
    document.body.appendChild(el);
    p={el,x:innerWidth/2,y:innerHeight/2,tx:innerWidth/2,ty:innerHeight/2,name:"",color};
    peers.set(pid,p);
  }
  if(name && p.name!==name){ p.name=name; p.el.querySelector(".name").textContent=name; }
  if(color && p.color!==color){ p.color=color; p.el.querySelector("svg path").setAttribute("fill",color); p.el.querySelector(".name").style.background=color; }
  return p;
}
function lerpPeers(){
  for(const[,p] of peers){
    p.x+=(p.tx-p.x)*0.3; p.y+=(p.ty-p.y)*0.3;
    p.el.style.transform="translate("+p.x+"px,"+p.y+"px)";
  }
  requestAnimationFrame(lerpPeers);
}
lerpPeers();

/* apply an authoritative snapshot: project normalized [0,1] coords into this viewport */
function applySnapshot(state){
  const cursors = state.cursors || {};
  const live = new Set(Object.keys(cursors));
  for(const pid in cursors){
    if(pid===id) continue; // own pointer is rendered locally for zero lag
    const c=cursors[pid];
    const p=ensurePeer(pid, c.name, c.color||"#37c6ff");
    p.tx = (c.x||0)*innerWidth;
    p.ty = (c.y||0)*innerHeight;
  }
  // drop peers no longer in the authoritative state (host culled them)
  for(const[pid,p] of peers){ if(!live.has(pid)){ p.el.remove(); peers.delete(pid); } }
  // authoritative ripples: start each one once, projected into this viewport
  const rs = state.ripples || [];
  for(const r of rs){
    const key = r.by + ":" + Math.round((r.x||0)*1e4) + ":" + Math.round((r.y||0)*1e4) + ":" + r.life;
    // life decreases over time; only fire on the freshest sighting per (by,pos)
    const fkey = r.by + ":" + Math.round((r.x||0)*1e4) + ":" + Math.round((r.y||0)*1e4);
    if(!seenRipples.has(fkey)){
      seenRipples.add(fkey);
      if(r.by!==id) ripple((r.x||0)*innerWidth, (r.y||0)*innerHeight, r.color||"#37c6ff");
      // forget the dedupe key after the ripple's lifetime so the same spot can ripple again
      setTimeout(()=>seenRipples.delete(fkey), 1400);
    }
  }
  // live count = authoritative cursor count (includes me)
  document.getElementById("liveN").textContent = live.size;
}

/* status UI */
const dot=document.getElementById("dot"), foot=document.getElementById("foot"), liveL=document.getElementById("liveL");
function setConn(ok, text){
  dot.classList.toggle("off", !ok);
  if(text) foot.textContent = text;
}

/* wire it up: send my pointer as input, render whatever the backend broadcasts */
const game = createMeshGame({
  room: ROOM, id, hz: HZ,
  input: () => {
    if(!moved) return null;
    const inp = { x: Math.round(mx), y: Math.round(my), w: innerWidth, h: innerHeight,
                  click: wantClick, name: myName, color: myColor };
    wantClick = false; // one-shot per click
    return inp;
  },
  // My current sector drives interest management: which sector hosts I subscribe to / publish to.
  sector: () => sectorAt(mx/innerWidth, my/innerHeight),
  onState: (state) => applySnapshot(state),
  onStatus: (ok) => {
    if(ok){
      setConn(true, "authoritative host: " + game.hostShort() + " · tick " + game.tick());
    } else {
      setConn(false, "offline — run a local CE node and `game-cursors --shard`");
    }
  },
});

/* keep the footer fresh with host + sector + rtt while connected */
setInterval(()=>{
  if(game.hostAlive()){
    setConn(true, "host " + game.hostShort() + " · sector " + game.sector()
                  + " · " + game.sectorsSeen() + " sectors in view · tick " + game.tick());
    liveL.textContent = "here now";
  } else if(game.online()){
    setConn(true, "waiting for the game-cursors backend to host your sectors…");
  }
}, 1000);
</script>
