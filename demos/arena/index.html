<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>CE Arena — live multiplayer orb arena</title>
<meta name="theme-color" content="#03060e" />
<meta name="description" content="A glowing live multiplayer orb-collection arena. Pile in, grab orbs, climb the leaderboard. Share the link and your whole audience joins the same arena." />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='9' fill='%2337c6ff'/%3E%3Ccircle cx='16' cy='16' r='13' fill='none' stroke='%237af0e6' stroke-width='1.6' opacity='.5'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..700;1,9..144,500..600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#03060e;--deep:#070d18;--panel:#0a1422;--line:rgba(116,176,255,.13);--line-2:rgba(116,176,255,.07);
  --text:#e9f1fb;--muted:#92a8c6;--faint:#5e768f;--blue:#3b82ff;--cyan:#37c6ff;--surf:#7af0ff;--ok:#43e0a0;--bad:#ff5d72;--gold:#ffd166;
  --grad:linear-gradient(118deg,#2f6bff,#37c6ff 56%,#7af0e6);--display:"Fraunces",serif;--body:"Hanken Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box}html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
body{background:var(--abyss);color:var(--text);font-family:var(--body);line-height:1.5;-webkit-font-smoothing:antialiased;touch-action:none}
canvas{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0}
a{color:inherit;text-decoration:none}

/* ---- HUD (in-game) ---- */
.hud{position:fixed;z-index:5;pointer-events:none}
.topbar{top:0;left:0;right:0;display:flex;align-items:flex-start;gap:10px;padding:12px 14px;padding-top:calc(12px + env(safe-area-inset-top))}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--display);font-weight:600;font-size:18px;letter-spacing:-.01em;pointer-events:auto}
.brand .ce{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.brand svg{width:22px;height:22px;flex:none}
.sp{flex:1}
.pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:99px;background:rgba(7,13,24,.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);padding:7px 14px;pointer-events:auto}
.pill .dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 0 rgba(67,224,160,.5);animation:p 2s infinite}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(67,224,160,.5)}100%{box-shadow:0 0 0 9px rgba(67,224,160,0)}}
.pill .dot.off{background:var(--faint);animation:none;box-shadow:none}
.pill .n{font-family:var(--display);font-weight:600;font-size:17px;line-height:1}
.pill .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}

.score{position:fixed;left:50%;top:calc(14px + env(safe-area-inset-top));transform:translateX(-50%);z-index:5;text-align:center;pointer-events:none}
.score .v{font-family:var(--display);font-weight:700;font-size:34px;line-height:1;letter-spacing:-.02em;text-shadow:0 2px 18px rgba(55,198,255,.4)}
.score .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:2px}

/* leaderboard */
.lb{position:fixed;right:0;top:64px;top:calc(64px + env(safe-area-inset-top));z-index:5;width:208px;max-width:46vw;
  border:1px solid var(--line);border-top-left-radius:14px;border-bottom-left-radius:14px;border-right:0;
  background:rgba(7,13,24,.72);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);overflow:hidden;pointer-events:auto}
.lb h3{margin:0;padding:10px 14px 8px;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);border-bottom:1px solid var(--line-2)}
.lb ol{margin:0;padding:6px 0 8px;list-style:none;counter-reset:r}
.lb li{counter-increment:r;display:flex;align-items:center;gap:8px;padding:4px 14px;font-size:13px;min-width:0}
.lb li::before{content:counter(r);font-family:var(--mono);font-size:11px;color:var(--faint);width:14px;flex:none;text-align:right}
.lb li.me{background:rgba(55,198,255,.09)}
.lb .sw{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 7px currentColor}
.lb .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.lb .me .nm{color:var(--surf);font-weight:600}
.lb .sc{font-family:var(--mono);font-size:12px;color:var(--gold);flex:none}
.lb .empty{padding:10px 14px;color:var(--faint);font-size:12px}

/* chat */
.chat{position:fixed;left:0;bottom:0;z-index:5;width:300px;max-width:78vw;padding:0 0 calc(8px + env(safe-area-inset-bottom)) 12px}
.chat .log{display:flex;flex-direction:column;gap:3px;max-height:30vh;overflow:hidden;margin-bottom:8px;pointer-events:none;mask-image:linear-gradient(0deg,#000 70%,transparent)}
.chat .msg{font-size:13px;color:var(--muted);text-shadow:0 1px 6px #000;line-height:1.35}
.chat .msg b{color:var(--surf);font-weight:600}
.chat form{display:flex;gap:7px;pointer-events:auto}
.chat input{flex:1;min-width:0;background:rgba(7,13,24,.78);border:1px solid var(--line);border-radius:10px;color:var(--text);
  font-family:var(--body);font-size:13px;padding:9px 12px;outline:none;backdrop-filter:blur(8px)}
.chat input:focus{border-color:rgba(55,198,255,.45)}
.chat .send{flex:none;border:1px solid var(--line);background:rgba(7,13,24,.78);color:var(--muted);border-radius:10px;padding:0 12px;font-size:12px;font-family:var(--mono);cursor:pointer}
.chat .send:hover{color:var(--text);border-color:rgba(55,198,255,.4)}

.hint{position:fixed;left:50%;bottom:calc(16px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:4;
  font-family:var(--mono);font-size:11.5px;color:var(--faint);text-align:center;pointer-events:none;transition:opacity .6s;text-shadow:0 1px 6px #000}

/* ---- Join screen ---- */
.join{position:fixed;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(70% 55% at 50% 18%,rgba(55,198,255,.16),transparent 60%),radial-gradient(60% 45% at 88% 108%,rgba(47,107,255,.16),transparent 60%),rgba(3,6,14,.86);
  backdrop-filter:blur(3px);transition:opacity .45s,visibility .45s}
.join.hide{opacity:0;visibility:hidden;pointer-events:none}
.card{width:100%;max-width:420px;text-align:center}
.card .kick{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan)}
.card h1{font-family:var(--display);font-weight:600;font-size:clamp(40px,12vw,64px);letter-spacing:-.03em;line-height:.98;margin:10px 0 0}
.card h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.card .lede{color:var(--muted);margin:14px auto 0;max-width:34ch;font-size:15px}
.livecount{margin:22px 0 0;font-family:var(--mono);font-size:13px;color:var(--muted)}
.livecount b{color:var(--ok);font-weight:600;font-family:var(--display);font-size:17px}
.livecount .pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--ok);margin-right:6px;vertical-align:1px;box-shadow:0 0 0 0 rgba(67,224,160,.5);animation:p 2s infinite}
.namerow{display:flex;gap:9px;margin:24px auto 0;max-width:360px}
.namerow input{flex:1;min-width:0;background:#060b14;border:1px solid var(--line);border-radius:13px;color:var(--text);
  font-family:var(--display);font-weight:600;font-size:19px;padding:14px 16px;outline:none;text-align:center}
.namerow input:focus{border-color:rgba(55,198,255,.5)}
.namerow .dice{flex:none;width:52px;border:1px solid var(--line);border-radius:13px;background:#060b14;color:var(--muted);cursor:pointer;font-size:20px;transition:.16s}
.namerow .dice:hover{color:var(--cyan);border-color:rgba(55,198,255,.4)}
.play{margin:14px 0 0;width:100%;max-width:360px;border:0;border-radius:14px;padding:16px;cursor:pointer;
  font-family:var(--body);font-weight:700;font-size:18px;color:#021018;background:var(--grad);transition:.16s}
.play:hover{transform:translateY(-1px);filter:brightness(1.06)}
.play:active{transform:translateY(0)}
.how{margin:22px auto 0;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;color:var(--faint);font-size:12.5px}
.how span{display:inline-flex;align-items:center;gap:6px}
.how i{width:5px;height:5px;border-radius:50%;background:var(--cyan);display:inline-block}
.share2{margin:18px auto 0;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;
  background:rgba(116,176,255,.05);color:var(--muted);font-size:13px;padding:9px 15px;cursor:pointer;font-family:var(--mono)}
.share2:hover{color:var(--text);border-color:rgba(55,198,255,.4)}

/* share button in HUD */
.sharebtn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:99px;background:rgba(7,13,24,.72);
  backdrop-filter:blur(8px);color:var(--muted);font-size:12.5px;font-family:var(--mono);padding:8px 13px;cursor:pointer;pointer-events:auto}
.sharebtn:hover{color:var(--text);border-color:rgba(55,198,255,.4)}
.sharebtn svg{width:14px;height:14px}

.toast{position:fixed;left:50%;bottom:calc(70px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(10px);z-index:30;
  background:rgba(7,13,24,.92);border:1px solid var(--line);border-radius:11px;padding:10px 16px;font-size:13px;color:var(--text);
  opacity:0;transition:.3s;pointer-events:none;backdrop-filter:blur(8px)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media (max-width:560px){
  .lb{width:168px;top:calc(58px + env(safe-area-inset-top))}
  .score .v{font-size:28px}
  .brand{font-size:16px}
  .chat{max-width:62vw}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>

<!-- in-game HUD -->
<div class="hud topbar">
  <div class="brand">
    <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="9" fill="#37c6ff"/><circle cx="16" cy="16" r="13" stroke="#7af0e6" stroke-width="1.6" opacity=".5"/></svg>
    <span><span class="ce">CE</span> Arena</span>
  </div>
  <div class="sp"></div>
  <button class="sharebtn" id="shareHud" title="Copy link for friends">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></svg>
    Share
  </button>
  <div class="pill"><span class="dot off" id="liveDot"></span><span class="n" id="liveN">1</span><span class="lbl">playing now</span></div>
</div>

<div class="score">
  <div class="v" id="myScore">0</div>
  <div class="k">your score</div>
</div>

<aside class="lb">
  <h3>Leaderboard</h3>
  <ol id="lbList"><li class="empty">loading…</li></ol>
</aside>

<div class="chat">
  <div class="log" id="chatLog"></div>
  <form id="chatForm" autocomplete="off">
    <input id="chatInput" maxlength="120" placeholder="say something…" />
    <button class="send" type="submit">Send</button>
  </form>
</div>

<div class="hint" id="hint">move toward the pointer — collect glowing orbs</div>

<!-- join / title screen -->
<div class="join" id="join">
  <div class="card">
    <div class="kick">live multiplayer</div>
    <h1>CE <em>Arena</em></h1>
    <p class="lede">A glowing arena anyone can pile into. Grab orbs, grow your blob, climb the board.</p>
    <div class="livecount"><span class="pulse"></span><b id="joinLiveN">1</b> playing right now</div>
    <div class="namerow">
      <input id="nameInput" maxlength="16" placeholder="your name" />
      <button class="dice" id="dice" title="random name">~</button>
    </div>
    <button class="play" id="playBtn">Play</button>
    <div class="how">
      <span><i></i>mouse or touch to move</span>
      <span><i></i>orbs = points</span>
      <span><i></i>top 10 saved</span>
    </div>
    <button class="share2" id="shareJoin">copy invite link</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
const APP = "arena";
const ROOM = "main";

/* ---------- identity (stable per browser) ---------- */
const ADJ=["Neon","Cosmic","Turbo","Lunar","Volt","Hyper","Pixel","Quantum","Solar","Frost","Blaze","Echo","Drift","Nova","Zephyr","Glitch","Vortex","Cobalt","Prism","Rogue"];
const NOUN=["Orca","Comet","Falcon","Tiger","Wisp","Yeti","Phoenix","Otter","Raven","Lynx","Bolt","Sprite","Drake","Mantis","Koi","Heron","Wolf","Moth","Shark","Fox"];
function randHandle(){return ADJ[Math.random()*ADJ.length|0]+NOUN[Math.random()*NOUN.length|0]+(Math.random()*90+10|0);}
function loadId(){
  let id=localStorage.getItem("arena_id");
  if(!id){id=(Date.now().toString(36)+Math.random().toString(36).slice(2,8));localStorage.setItem("arena_id",id);}
  return id;
}
const myId=loadId();
let myName=(localStorage.getItem("arena_name")||"").slice(0,16);
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
const myHue=hashStr(myId)%360;
function hsl(h,s,l,a){return `hsla(${h},${s}%,${l}%,${a==null?1:a})`;}
const myColor=hsl(myHue,80,60);

/* ---------- world constants ---------- */
const WORLD=4000;                 // square map size
const ORB_CELL=150;               // grid cell for shared orb field
const ORB_RADIUS=9;
const RESPAWN_MS=14000;           // an orb you collect is "gone" for ~this long for you; field still deterministic
const BASE_R=17;                  // starting blob radius
const MAX_R=46;
const SPEED=4.0;                  // base speed (units/frame at 60fps)
const PEER_TTL=3000;              // ms silent -> expire
const BROADCAST_MS=80;            // ~12.5/sec
const PERSIST_MS=4000;            // leaderboard write cadence
const LB_REFRESH_MS=5000;

/* ---------- canvas ---------- */
const cv=document.getElementById("cv");
const ctx=cv.getContext("2d");
let DPR=Math.min(window.devicePixelRatio||1,2);
let VW=0,VH=0;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  VW=window.innerWidth;VH=window.innerHeight;
  cv.width=VW*DPR;cv.height=VH*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener("resize",resize);resize();

/* ---------- my state ---------- */
const me={
  x:WORLD/2+(Math.random()-.5)*600,
  y:WORLD/2+(Math.random()-.5)*600,
  r:BASE_R, score:0, hue:myHue,
};
let target={x:me.x,y:me.y};
let camX=me.x,camY=me.y;
let playing=false;

/* collected orbs: key -> timestamp collected (deterministic respawn based on this) */
const collected=new Map();

/* ---------- peers ---------- */
const peers=new Map(); // id -> {name,x,y,px,py,score,hue,r,last,rt}
function peerColor(p){return hsl(p.hue,78,60);}

/* ---------- deterministic shared orb field ----------
   Each grid cell (cx,cy) has at most one orb. Whether it currently exists,
   and its sub-cell position, derive from a hash of the cell coords + a slow
   time epoch, so every client computes the same field. Collecting is local:
   we hide it for RESPAWN_MS, then it's shown again (matching the field). */
function cellHash(cx,cy,salt){
  let h=hashStr(cx+":"+cy+":"+salt);
  return h;
}
function orbInCell(cx,cy){
  // ~62% of cells host an orb; stable position within the cell
  const h=cellHash(cx,cy,"orb");
  if((h%100)>=62) return null;
  const ox=((h>>>8)%1000)/1000, oy=((h>>>18)%1000)/1000;
  const x=cx*ORB_CELL+ox*ORB_CELL, y=cy*ORB_CELL+oy*ORB_CELL;
  if(x<ORB_RADIUS||y<ORB_RADIUS||x>WORLD-ORB_RADIUS||y>WORLD-ORB_RADIUS) return null;
  const hue=(cellHash(cx,cy,"hue"))%360;
  return {x,y,hue,key:cx+","+cy};
}

/* ---------- particles ---------- */
const parts=[];
function pop(x,y,hue,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=1.5+Math.random()*3.5;
    parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,hue});
  }
}

/* ---------- input ---------- */
function setTargetFromClient(cx,cy){
  target.x=camX+(cx-VW/2);
  target.y=camY+(cy-VH/2);
}
let pointerActive=false;
cv.addEventListener("mousemove",e=>{if(playing){setTargetFromClient(e.clientX,e.clientY);}});
cv.addEventListener("mousedown",e=>{if(playing){pointerActive=true;setTargetFromClient(e.clientX,e.clientY);}});
window.addEventListener("mouseup",()=>pointerActive=false);
cv.addEventListener("touchstart",e=>{if(playing){const t=e.touches[0];setTargetFromClient(t.clientX,t.clientY);e.preventDefault();}},{passive:false});
cv.addEventListener("touchmove",e=>{if(playing){const t=e.touches[0];setTargetFromClient(t.clientX,t.clientY);e.preventDefault();}},{passive:false});

/* ---------- realtime ---------- */
function wsURL(app,room){return (location.protocol==="https:"?"wss":"ws")+"://"+location.host+"/rt/"+app+"/"+room;}
let ws=null, wsReady=false;
function connectWS(){
  try{ws=new WebSocket(wsURL(APP,ROOM));}catch(e){scheduleReconnect();return;}
  ws.onopen=()=>{
    wsReady=true;
    document.getElementById("liveDot").classList.remove("off");
    ws.send(JSON.stringify({t:"join",id:myId,name:displayName(),hue:myHue}));
  };
  ws.onmessage=ev=>{
    let m;try{m=JSON.parse(ev.data);}catch(e){return;}
    if(!m||m.id===myId) return;
    if(m.t==="pos"||m.t==="join"){
      let p=peers.get(m.id);
      const now=performance.now();
      if(!p){p={hue:(m.hue==null?hashStr(m.id)%360:m.hue),px:m.x,py:m.y,x:m.x,y:m.y,r:BASE_R,score:0,last:now,rt:now};peers.set(m.id,p);}
      p.name=m.name||p.name||"player";
      if(m.hue!=null)p.hue=m.hue;
      if(m.x!=null){p.px=p.x;p.py=p.y;p.x=m.x;p.y=m.y;p.rt=now;}
      if(m.score!=null){p.score=m.score;p.r=BASE_R+Math.min(MAX_R-BASE_R,m.score*0.55);}
      p.last=now;
    }else if(m.t==="chat"){
      addChat(m.name||"player",m.text);
    }
  };
  ws.onclose=()=>{wsReady=false;document.getElementById("liveDot").classList.add("off");scheduleReconnect();};
  ws.onerror=()=>{try{ws.close();}catch(e){}};
}
let reconnectT=null;
function scheduleReconnect(){if(reconnectT)return;reconnectT=setTimeout(()=>{reconnectT=null;connectWS();},1500);}
connectWS();

let lastBroadcast=0;
function broadcast(now){
  if(!wsReady||!playing) return;
  if(now-lastBroadcast<BROADCAST_MS) return;
  lastBroadcast=now;
  try{ws.send(JSON.stringify({t:"pos",id:myId,name:displayName(),hue:myHue,x:Math.round(me.x),y:Math.round(me.y),score:me.score}));}catch(e){}
}

/* ---------- live count ---------- */
function livePeerCount(){
  const now=performance.now();let c=0;
  for(const p of peers.values()){if(now-p.last<=PEER_TTL)c++;}
  return c;
}
function updateLiveCount(){
  const others=livePeerCount();
  const total=others+(playing?1:0);
  const shown=Math.max(total,1);
  document.getElementById("liveN").textContent=shown;
  document.getElementById("joinLiveN").textContent=Math.max(others+1,1);
}

/* ---------- leaderboard ---------- */
function dbURL(app,key){return location.origin+"/db/"+app+(key?"/"+encodeURIComponent(key):"");}
let lastPersist=0,lastPersistedScore=-1;
async function persistScore(now,force){
  if(!playing) return;
  if(!force && now-lastPersist<PERSIST_MS) return;
  if(me.score===lastPersistedScore && !force) return;
  lastPersist=now;lastPersistedScore=me.score;
  try{
    await fetch(dbURL(APP,"score:"+myId),{method:"PUT",headers:{"content-type":"application/json"},
      body:JSON.stringify({name:displayName(),score:me.score})});
  }catch(e){}
}
async function refreshLeaderboard(){
  let items=[];
  try{
    const r=await fetch(dbURL(APP)+"?prefix=score:&limit=60");
    if(r.ok){const j=await r.json();items=(j&&j.items)||[];}
  }catch(e){}
  const rows=items.map(it=>{
    const v=it.value||{};const key=(it.key||"").slice("score:".length);
    return {id:key,name:(v.name||"player"),score:(v.score|0)};
  });
  // ensure my live score is represented (in case db lag)
  if(playing){
    const mine=rows.find(r=>r.id===myId);
    if(mine){if(me.score>mine.score)mine.score=me.score;mine.name=displayName();}
    else rows.push({id:myId,name:displayName(),score:me.score});
  }
  rows.sort((a,b)=>b.score-a.score);
  const top=rows.slice(0,10);
  const el=document.getElementById("lbList");
  if(top.length===0){el.innerHTML='<li class="empty">be the first to score</li>';return;}
  el.innerHTML=top.map(r=>{
    const hue=hashStr(r.id)%360;
    const me_=r.id===myId?" me":"";
    return `<li class="${me_.trim()}"><span class="sw" style="color:${hsl(hue,80,62)};background:${hsl(hue,80,62)}"></span><span class="nm">${esc(r.name)}</span><span class="sc">${r.score}</span></li>`;
  }).join("");
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- chat ---------- */
const chatLog=document.getElementById("chatLog");
const chatMsgs=[];
function addChat(name,text){
  if(!text)return;
  chatMsgs.push({name,text});
  if(chatMsgs.length>40)chatMsgs.shift();
  chatLog.innerHTML=chatMsgs.slice(-8).map(m=>`<div class="msg"><b>${esc(m.name)}</b> ${esc(m.text)}</div>`).join("");
}
document.getElementById("chatForm").addEventListener("submit",e=>{
  e.preventDefault();
  const inp=document.getElementById("chatInput");
  const text=inp.value.trim().slice(0,120);
  inp.value="";
  if(!text||!playing)return;
  addChat(displayName(),text);
  if(wsReady){try{ws.send(JSON.stringify({t:"chat",id:myId,name:displayName(),text}));}catch(e){}}
});

/* ---------- name / join ---------- */
function displayName(){return (myName&&myName.trim())?myName.trim():"player";}
const nameInput=document.getElementById("nameInput");
nameInput.value=myName||randHandle();
document.getElementById("dice").addEventListener("click",()=>{nameInput.value=randHandle();nameInput.focus();});
nameInput.addEventListener("keydown",e=>{if(e.key==="Enter")doPlay();});
document.getElementById("playBtn").addEventListener("click",doPlay);
function doPlay(){
  const v=nameInput.value.trim().slice(0,16)||randHandle();
  myName=v;localStorage.setItem("arena_name",v);
  playing=true;
  document.getElementById("join").classList.add("hide");
  if(wsReady){try{ws.send(JSON.stringify({t:"join",id:myId,name:displayName(),hue:myHue}));}catch(e){}}
  persistScore(performance.now(),true);
  setTimeout(()=>{const h=document.getElementById("hint");if(h)h.style.opacity="0";},6000);
}

/* ---------- share ---------- */
function shareLink(){
  const url=location.href.split("#")[0];
  const done=()=>toast("Invite link copied — share it so everyone joins this arena");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(done,()=>fallbackCopy(url,done));
  }else fallbackCopy(url,done);
}
function fallbackCopy(text,cb){
  const ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);cb&&cb();
}
let toastT=null;
function toast(msg){
  const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove("show"),2600);
}
document.getElementById("shareHud").addEventListener("click",shareLink);
document.getElementById("shareJoin").addEventListener("click",shareLink);

/* ---------- update loop ---------- */
let lastT=performance.now();
function update(now){
  const dt=Math.min(3,(now-lastT)/16.6667);lastT=now;

  if(playing){
    // ease toward target
    const dx=target.x-me.x, dy=target.y-me.y;
    const dist=Math.hypot(dx,dy);
    if(dist>0.5){
      const slow=Math.max(0.62,1-(me.r-BASE_R)/(MAX_R-BASE_R)*0.32); // bigger = a touch slower
      const step=Math.min(dist,SPEED*slow*dt*1.0);
      me.x+=dx/dist*step;me.y+=dy/dist*step;
    }
    me.x=Math.max(me.r,Math.min(WORLD-me.r,me.x));
    me.y=Math.max(me.r,Math.min(WORLD-me.r,me.y));

    // collisions with orb field (check cells around me)
    const cR=me.r+ORB_RADIUS;
    const minCx=Math.floor((me.x-cR)/ORB_CELL),maxCx=Math.floor((me.x+cR)/ORB_CELL);
    const minCy=Math.floor((me.y-cR)/ORB_CELL),maxCy=Math.floor((me.y+cR)/ORB_CELL);
    for(let cx=minCx;cx<=maxCx;cx++)for(let cy=minCy;cy<=maxCy;cy++){
      const o=orbInCell(cx,cy);if(!o)continue;
      const ct=collected.get(o.key);
      if(ct && now-ct<RESPAWN_MS) continue; // still on cooldown for me
      const ddx=o.x-me.x,ddy=o.y-me.y;
      if(ddx*ddx+ddy*ddy<=cR*cR){
        collected.set(o.key,now);
        me.score++;
        me.r=Math.min(MAX_R,BASE_R+me.score*0.55);
        pop(o.x,o.y,o.hue,10);
        if(me.score-lastPersistedScore>=5) persistScore(now,true);
      }
    }
    // prune expired cooldowns occasionally
    if(collected.size>400){for(const[k,t]of collected){if(now-t>RESPAWN_MS)collected.delete(k);}}

    document.getElementById("myScore").textContent=me.score;
  }

  // camera follow
  const tcx=playing?me.x:WORLD/2, tcy=playing?me.y:WORLD/2;
  camX+=(tcx-camX)*Math.min(1,0.12*dt);
  camY+=(tcy-camY)*Math.min(1,0.12*dt);

  // particles
  for(let i=parts.length-1;i>=0;i--){
    const pt=parts[i];pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.vx*=0.92;pt.vy*=0.92;pt.life-=0.045*dt;
    if(pt.life<=0)parts.splice(i,1);
  }

  // expire silent peers
  const tnow=performance.now();
  for(const[id,p]of peers){if(tnow-p.last>PEER_TTL)peers.delete(id);}

  broadcast(now);
}

/* ---------- render ---------- */
function worldToScreen(x,y){return [x-camX+VW/2,y-camY+VH/2];}
function render(now){
  ctx.clearRect(0,0,VW,VH);
  // background gradient
  const g=ctx.createRadialGradient(VW/2,VH*0.2,0,VW/2,VH*0.2,Math.max(VW,VH));
  g.addColorStop(0,"#070f1e");g.addColorStop(1,"#03060e");
  ctx.fillStyle=g;ctx.fillRect(0,0,VW,VH);

  // grid
  drawGrid();
  // world border
  drawBorder();

  // orbs (only those on screen)
  drawOrbs(now);

  // particles
  for(const pt of parts){
    const[sx,sy]=worldToScreen(pt.x,pt.y);
    ctx.globalAlpha=Math.max(0,pt.life);
    ctx.fillStyle=hsl(pt.hue,90,65);
    ctx.beginPath();ctx.arc(sx,sy,2.6*pt.life+0.6,0,7);ctx.fill();
  }
  ctx.globalAlpha=1;

  // peers
  const tnow=performance.now();
  for(const p of peers.values()){
    if(tnow-p.last>PEER_TTL)continue;
    // simple smoothing toward latest reported pos
    const lerp=Math.min(1,(tnow-p.rt)/BROADCAST_MS);
    const rx=p.px+(p.x-p.px)*Math.min(1.5,lerp);
    const ry=p.py+(p.y-p.py)*Math.min(1.5,lerp);
    drawBlob(rx,ry,p.r,p.hue,p.name,false);
  }

  // me on top
  if(playing){
    drawBlob(me.x,me.y,me.r,me.hue,displayName(),true);
  }
}

function drawGrid(){
  const step=ORB_CELL;
  ctx.lineWidth=1;
  ctx.strokeStyle="rgba(116,176,255,.05)";
  const startX=Math.floor((camX-VW/2)/step)*step;
  const startY=Math.floor((camY-VH/2)/step)*step;
  ctx.beginPath();
  for(let x=startX;x<camX+VW/2+step;x+=step){
    const sx=x-camX+VW/2;ctx.moveTo(sx,0);ctx.lineTo(sx,VH);
  }
  for(let y=startY;y<camY+VH/2+step;y+=step){
    const sy=y-camY+VH/2;ctx.moveTo(0,sy);ctx.lineTo(VW,sy);
  }
  ctx.stroke();
}
function drawBorder(){
  const[x0,y0]=worldToScreen(0,0);
  const[x1,y1]=worldToScreen(WORLD,WORLD);
  ctx.strokeStyle="rgba(55,198,255,.22)";ctx.lineWidth=2;
  ctx.strokeRect(x0,y0,x1-x0,y1-y0);
  // soft inner glow vignette near edges handled by gradient bg
}

function drawOrbs(now){
  const cR=ORB_CELL;
  const minCx=Math.floor((camX-VW/2)/cR)-1,maxCx=Math.floor((camX+VW/2)/cR)+1;
  const minCy=Math.floor((camY-VH/2)/cR)-1,maxCy=Math.floor((camY+VH/2)/cR)+1;
  const t=now*0.004;
  for(let cx=minCx;cx<=maxCx;cx++)for(let cy=minCy;cy<=maxCy;cy++){
    const o=orbInCell(cx,cy);if(!o)continue;
    const ct=collected.get(o.key);
    if(ct && now-ct<RESPAWN_MS) continue;
    const[sx,sy]=worldToScreen(o.x,o.y);
    if(sx<-20||sx>VW+20||sy<-20||sy>VH+20)continue;
    const pulse=0.5+0.5*Math.sin(t+ (cx*7+cy*13));
    const r=ORB_RADIUS+pulse*1.6;
    // glow
    const gg=ctx.createRadialGradient(sx,sy,0,sx,sy,r*2.6);
    gg.addColorStop(0,hsl(o.hue,90,65,0.6));
    gg.addColorStop(1,hsl(o.hue,90,65,0));
    ctx.fillStyle=gg;ctx.beginPath();ctx.arc(sx,sy,r*2.6,0,7);ctx.fill();
    // core
    ctx.fillStyle=hsl(o.hue,85,68);
    ctx.beginPath();ctx.arc(sx,sy,r,0,7);ctx.fill();
    ctx.fillStyle=hsl(o.hue,90,86,0.9);
    ctx.beginPath();ctx.arc(sx-r*0.28,sy-r*0.28,r*0.34,0,7);ctx.fill();
  }
}

function drawBlob(wx,wy,r,hue,name,isMe){
  const[sx,sy]=worldToScreen(wx,wy);
  if(sx<-80||sx>VW+80||sy<-80||sy>VH+80)return;
  // outer glow
  const gg=ctx.createRadialGradient(sx,sy,r*0.4,sx,sy,r*2.2);
  gg.addColorStop(0,hsl(hue,80,60,isMe?0.5:0.34));
  gg.addColorStop(1,hsl(hue,80,60,0));
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(sx,sy,r*2.2,0,7);ctx.fill();
  // body
  const bg=ctx.createRadialGradient(sx-r*0.3,sy-r*0.3,r*0.2,sx,sy,r);
  bg.addColorStop(0,hsl(hue,85,70));
  bg.addColorStop(1,hsl(hue,75,48));
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(sx,sy,r,0,7);ctx.fill();
  // rim
  ctx.lineWidth=isMe?2.5:1.6;
  ctx.strokeStyle=isMe?hsl(hue,90,80,0.9):hsl(hue,80,72,0.5);
  ctx.beginPath();ctx.arc(sx,sy,r,0,7);ctx.stroke();
  // highlight
  ctx.fillStyle="rgba(255,255,255,.28)";
  ctx.beginPath();ctx.arc(sx-r*0.32,sy-r*0.32,r*0.3,0,7);ctx.fill();
  // name
  ctx.font="600 13px 'Hanken Grotesk',sans-serif";
  ctx.textAlign="center";ctx.textBaseline="bottom";
  const ny=sy-r-7;
  ctx.lineWidth=3;ctx.strokeStyle="rgba(3,6,14,.85)";
  ctx.strokeText(name,sx,ny);
  ctx.fillStyle=isMe?"#fff":"rgba(233,241,251,.92)";
  ctx.fillText(name,sx,ny);
}

/* ---------- main raf ---------- */
function frame(now){
  update(now);
  render(now);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ---------- timers ---------- */
setInterval(updateLiveCount,500);
setInterval(()=>persistScore(performance.now(),false),1500);
setInterval(refreshLeaderboard,LB_REFRESH_MS);
refreshLeaderboard();
updateLiveCount();

/* re-announce presence on join periodically so peers don't expire us before first move */
setInterval(()=>{
  if(wsReady&&playing){try{ws.send(JSON.stringify({t:"pos",id:myId,name:displayName(),hue:myHue,x:Math.round(me.x),y:Math.round(me.y),score:me.score}));}catch(e){}}
},1000);

/* persist a final score on unload */
window.addEventListener("beforeunload",()=>{
  if(playing&&navigator.sendBeacon){
    try{navigator.sendBeacon(dbURL(APP,"score:"+myId),new Blob([JSON.stringify({name:displayName(),score:me.score})],{type:"application/json"}));}catch(e){}
  }
});
</script>
</body>
