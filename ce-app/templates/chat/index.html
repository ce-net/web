<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CE Chat</title>
<meta name="theme-color" content="#03060e" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg fill='none' stroke='%2337c6ff' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3Cpath d='M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..700;1,9..144,500..600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#03060e;--deep:#070d18;--panel:#0a1422;--line:rgba(116,176,255,.13);--line-2:rgba(116,176,255,.07);
  --text:#e9f1fb;--muted:#92a8c6;--faint:#5e768f;--blue:#3b82ff;--cyan:#37c6ff;--surf:#7af0ff;--ok:#43e0a0;--bad:#ff5d72;--gold:#ffd166;
  --grad:linear-gradient(118deg,#2f6bff,#37c6ff 56%,#7af0e6);--display:"Fraunces",serif;--body:"Hanken Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--abyss);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;height:100dvh;display:flex;flex-direction:column}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(70% 50% at 50% -10%,rgba(55,198,255,.13),transparent 60%),radial-gradient(50% 40% at 90% 110%,rgba(47,107,255,.12),transparent 60%)}
header{position:relative;z-index:1;display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line-2);background:rgba(7,13,24,.7);backdrop-filter:blur(8px)}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:18px}
.brand svg{width:22px;height:22px}.brand .ce{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
header .sp{flex:1}
.pill{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:5px 11px;background:rgba(116,176,255,.04)}
.pill b{color:var(--cyan);font-weight:600}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:6px;box-shadow:0 0 8px var(--ok)}
#nameBtn{cursor:pointer;font-family:var(--body);font-weight:600;color:var(--text);background:rgba(116,176,255,.06);border:1px solid var(--line);border-radius:99px;padding:6px 13px;font-size:14px}
#nameBtn:hover{border-color:rgba(55,198,255,.4)}
main{position:relative;z-index:1;flex:1;overflow:hidden;display:flex;flex-direction:column;max-width:780px;width:100%;margin:0 auto}
#log{flex:1;overflow-y:auto;padding:20px 18px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:11px;max-width:88%;align-self:flex-start}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.av{width:34px;height:34px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:600;color:#021018}
.bubble{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel),var(--deep));border-radius:14px;padding:9px 13px;min-width:0}
.msg.me .bubble{background:linear-gradient(135deg,rgba(47,107,255,.22),rgba(55,198,255,.12));border-color:rgba(55,198,255,.3)}
.meta{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.meta b{font-size:13.5px;font-weight:600}
.meta .id{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.meta .t{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-left:auto}
.body{font-size:15px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
#composer{position:relative;z-index:1;display:flex;gap:10px;padding:13px 18px;border-top:1px solid var(--line-2);background:rgba(7,13,24,.8);backdrop-filter:blur(8px)}
#text{flex:1;background:#060b14;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:12px 15px;font-family:var(--body);font-size:15px;outline:none}
#text:focus{border-color:rgba(55,198,255,.45)}
button.send{border:0;color:#021018;font-weight:700;background:var(--grad);border-radius:12px;padding:0 20px;cursor:pointer;font-family:var(--body);font-size:15px}
button.send:hover{filter:brightness(1.08)}
@media(max-width:560px){.msg{max-width:94%}}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg viewBox="0 0 32 32"><g fill="none" stroke="#37c6ff" stroke-width="2.4" stroke-linecap="round"><path d="M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/><path d="M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/></g></svg>
    <span><span class="ce">CE</span> Chat</span>
  </div>
  <div class="sp"></div>
  <div class="pill"><span class="dot"></span><b id="online">1</b> online</div>
  <div class="pill">you <b id="meId">…</b></div>
  <button id="nameBtn">…</button>
</header>
<main>
  <div id="log"></div>
</main>
<form id="composer" autocomplete="off">
  <input id="text" placeholder="Message the lobby…" maxlength="2000" />
  <button class="send" type="submit">Send</button>
</form>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
