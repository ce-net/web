<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CE Notes</title>
<meta name="theme-color" content="#03060e" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg fill='none' stroke='%2337c6ff' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3Cpath d='M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500..700&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#03060e;--deep:#070d18;--panel:#0a1422;--line:rgba(116,176,255,.13);--line-2:rgba(116,176,255,.07);
  --text:#e9f1fb;--muted:#92a8c6;--faint:#5e768f;--cyan:#37c6ff;--ok:#43e0a0;--bad:#ff5d72;
  --grad:linear-gradient(118deg,#2f6bff,#37c6ff 56%,#7af0e6);--display:"Fraunces",serif;--body:"Hanken Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--abyss);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100dvh}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(70% 50% at 50% -10%,rgba(55,198,255,.13),transparent 60%),radial-gradient(50% 40% at 90% 110%,rgba(47,107,255,.12),transparent 60%)}
.wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 18px 60px}
header{display:flex;align-items:center;gap:12px;padding:18px 0 6px}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:19px}
.brand svg{width:23px;height:23px}.brand .ce{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
header .sp{flex:1}
.pill{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:5px 11px}
.pill b{color:var(--cyan)}
#nameBtn{cursor:pointer;font-family:var(--body);font-weight:600;color:var(--text);background:rgba(116,176,255,.06);border:1px solid var(--line);border-radius:99px;padding:6px 13px;font-size:14px}
h1{font-family:var(--display);font-weight:600;font-size:clamp(26px,6vw,36px);margin:14px 0 2px;letter-spacing:-.02em}
h1 em{font-style:italic;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.lede{color:var(--muted);margin:0 0 18px;font-size:15px}
#composer{display:flex;flex-direction:column;gap:10px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,var(--panel),var(--deep));padding:16px}
#text{background:#060b14;color:var(--text);border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-family:var(--body);font-size:15px;outline:none;resize:vertical;min-height:74px;line-height:1.55}
#text:focus{border-color:rgba(55,198,255,.45)}
.crow{display:flex;align-items:center;gap:10px}
.crow .hint{font-family:var(--mono);font-size:11px;color:var(--faint)}
.crow .sp{flex:1}
button.add{border:0;color:#021018;font-weight:700;background:var(--grad);border-radius:11px;padding:10px 18px;cursor:pointer;font-family:var(--body);font-size:15px}
#list{display:flex;flex-direction:column;gap:12px;margin-top:18px}
.card{border:1px solid var(--line);border-radius:14px;background:linear-gradient(180deg,var(--panel),var(--deep));padding:13px 15px}
.ctop{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.ctop b{font-size:14px}
.ctop .t{font-family:var(--mono);font-size:11px;color:var(--faint);margin-left:auto}
.del{border:1px solid var(--line);background:transparent;color:var(--bad);border-radius:8px;width:24px;height:24px;cursor:pointer;font-size:15px;line-height:1}
.ctext{font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg viewBox="0 0 32 32"><g fill="none" stroke="#37c6ff" stroke-width="2.4" stroke-linecap="round"><path d="M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/><path d="M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/></g></svg>
      <span><span class="ce">CE</span> Notes</span>
    </div>
    <div class="sp"></div>
    <div class="pill"><b id="count">0</b> notes</div>
    <button id="nameBtn">…</button>
  </header>
  <h1>A shared <em>guestbook</em></h1>
  <p class="lede">Persisted in the CE database, live across every open tab. Refresh anytime — it's all still here.</p>
  <form id="composer" autocomplete="off">
    <textarea id="text" placeholder="Leave a note…" maxlength="4000"></textarea>
    <div class="crow">
      <span class="hint">Cmd/Ctrl + Enter to post</span>
      <span class="sp"></span>
      <button class="add" type="submit">Post</button>
    </div>
  </form>
  <div id="list"></div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
