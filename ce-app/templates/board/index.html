<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>CE Board</title>
<meta name="theme-color" content="#03060e" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cg fill='none' stroke='%2337c6ff' stroke-width='2.4' stroke-linecap='round'%3E%3Cpath d='M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3Cpath d='M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3'/%3E%3C/g%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--abyss:#03060e;--deep:#070d18;--panel:#0a1422;--line:rgba(116,176,255,.13);--line-2:rgba(116,176,255,.07);
  --text:#e9f1fb;--muted:#92a8c6;--faint:#5e768f;--cyan:#37c6ff;--ok:#43e0a0;
  --grad:linear-gradient(118deg,#2f6bff,#37c6ff 56%,#7af0e6);--display:"Fraunces",serif;--body:"Hanken Grotesk",sans-serif;--mono:"JetBrains Mono",monospace}
*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--abyss);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line-2);background:rgba(7,13,24,.7);backdrop-filter:blur(8px);z-index:3}
.brand{display:flex;align-items:center;gap:9px;font-family:var(--display);font-weight:600;font-size:18px}
.brand svg{width:22px;height:22px}.brand .ce{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
header .sp{flex:1}
.pill{font-family:var(--mono);font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:99px;padding:5px 11px}
.pill b{color:var(--cyan)}
button.ghost{font-family:var(--body);font-weight:600;color:var(--text);background:rgba(116,176,255,.06);border:1px solid var(--line);border-radius:99px;padding:6px 14px;font-size:14px;cursor:pointer}
button.ghost:hover{border-color:rgba(55,198,255,.4)}
#stage{position:relative;flex:1;touch-action:none;cursor:crosshair;overflow:hidden;
  background:radial-gradient(60% 50% at 50% 0%,rgba(55,198,255,.07),transparent 60%),
  linear-gradient(0deg,rgba(116,176,255,.04) 1px,transparent 1px) 0 0/100% 28px,
  linear-gradient(90deg,rgba(116,176,255,.04) 1px,transparent 1px) 0 0/28px 100%}
#ink{position:absolute;inset:0;z-index:1}
#cursors{position:absolute;inset:0;z-index:2;pointer-events:none}
.cursor{position:absolute;top:0;left:0;will-change:transform;transition:transform .07s linear}
.cursor svg{display:block;filter:drop-shadow(0 1px 2px rgba(0,0,0,.5))}
.cursor .lbl{position:absolute;left:16px;top:14px;font-size:11px;font-weight:600;color:#021018;padding:2px 7px;border-radius:7px;white-space:nowrap;font-family:var(--body)}
.hint{position:absolute;left:50%;bottom:20px;transform:translateX(-50%);font-family:var(--mono);font-size:12px;color:var(--faint);background:rgba(7,13,24,.7);border:1px solid var(--line-2);border-radius:99px;padding:6px 14px;z-index:2;pointer-events:none}
</style>
</head>
<body>
<header>
  <div class="brand">
    <svg viewBox="0 0 32 32"><g fill="none" stroke="#37c6ff" stroke-width="2.4" stroke-linecap="round"><path d="M4 12c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/><path d="M4 19c3 0 3 3 6 3s3-3 6-3 3 3 6 3 3-3 6-3"/></g></svg>
    <span><span class="ce">CE</span> Board</span>
  </div>
  <div class="sp"></div>
  <div class="pill"><b id="peers">1</b> here</div>
  <button id="clear" class="ghost">Clear</button>
</header>
<div id="stage">
  <canvas id="ink"></canvas>
  <div id="cursors"></div>
  <div class="hint">drag to draw · move to share your cursor · everything is live &amp; ephemeral</div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
