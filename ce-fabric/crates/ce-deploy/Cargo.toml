[package]
name = "ce-deploy"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

[dev-dependencies]
tokio = { version = "1", features = ["full"] }
tracing-subscriber = "0.3"
ce-node = { path = "../ce-node" }
ce-chain = { path = "../ce-chain" }
ce-identity = { path = "../ce-identity" }
hex = "0.4"
