[package]
name = "ce-tls"
version = "0.1.0"
edition = "2024"
description = "TLS-from-identity for CE: self-signed certs keyed by a node's Ed25519 identity, with NodeId-pinned verification."

[dependencies]
anyhow = "1"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rcgen = "0.11"

[dev-dependencies]
ce-identity = { path = "../ce-identity" }
