[package]
name = "ce-wasm"
version = "0.1.0"
edition = "2024"
description = "WebAssembly execution backend for CE: a wasmtime-based Runtime, fuel-metered and memory-capped."

[dependencies]
ce-runtime = { path = "../ce-runtime" }
anyhow = "1"
async-trait = "0.1"
sha2 = "0.10"
hex = "0.4"
tracing = "0.1"
tokio = { version = "1", features = ["rt"] }
wasmtime = { version = "46", default-features = false, features = ["cranelift", "runtime", "anyhow"] }
wasmtime-wasi = "46"

[dev-dependencies]
wat = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
