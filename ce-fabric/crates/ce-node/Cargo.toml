[package]
name = "ce-node"
version = "0.1.0"
edition = "2024"

[dependencies]
ce-identity = { path = "../ce-identity" }
ce-cap = { path = "../ce-cap" }
ce-guard = { path = "../ce-guard" }
ce-chain = { path = "../ce-chain" }
ce-mesh = { path = "../ce-mesh" }
ce-container = { path = "../ce-container" }
ce-protocol = { path = "../ce-protocol" }
ce-runtime = { path = "../ce-runtime" }
ce-wasm = { path = "../ce-wasm" }
ce-tls = { path = "../ce-tls" }
tokio-rustls = "0.26"
hyper-util = { version = "0.1", features = ["server-auto", "tokio", "service"] }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
serde_json = "1"
bincode = "1"
directories = "5"
dirs-next = "2"
axum = "0.7"
tower-http = { version = "0.6", features = ["cors"] }
bollard = "0.17"
futures = "0.3"
tokio-util = { version = "0.7", features = ["compat"] }
hex = "0.4"
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[dev-dependencies]
reqwest = { version = "0.12", features = ["json"] }
ce-tls = { path = "../ce-tls" }
tokio-rustls = "0.26"
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
tokio = { version = "1", features = ["full"] }
ce-mesh = { path = "../ce-mesh" }
ce-identity = { path = "../ce-identity" }
ce-protocol = { path = "../ce-protocol" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
wat = "1"
