name: CI

on:
  push:
    branches: [main, phase0-settlement-burn]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Fast checks (every push / PR) ──────────────────────────────────────────

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Cross-platform cargo cache (handles Windows/macOS/Linux paths correctly).
      - uses: Swatinem/rust-cache@v2

      - name: Unit + integration tests
        run: cargo test --workspace

  # ── Boundary gates (every push / PR) ───────────────────────────────────────
  # CE is primitives-only. These greps FAIL the build if a forbidden surface appears, so the
  # boundary cannot erode silently. See ce/docs/primitives.md and ce/docs/api.md.
  boundary:
    name: Boundary gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GATE 1 — no HTTP /key/* route may ever exist. Key material must not cross the API boundary:
      # a /key/export endpoint would let any holder of the api.token exfiltrate the node identity,
      # turning a same-host file-permission problem into a network-reachable one. Key backup/restore
      # is a deliberate, interactive, same-host CLI action only (see src/keybackup.rs).
      - name: No HTTP /key/* route
        run: |
          if grep -REn 'route\(\s*"/key' crates/ ; then
            echo "::error::Forbidden /key/* HTTP route found. Key material must never cross the API boundary — keep key backup/restore CLI-only (src/keybackup.rs)."
            exit 1
          fi
          echo "OK: no /key/* HTTP route."

      # GATE 2 — no credential-/credit-minting endpoint. Credits are minted ONLY by the consensus
      # UptimeReward path inside ce-chain; there must be no HTTP route that mints, prints, grants, or
      # tops up balances/credits out of thin air.
      - name: No credential-/credit-minting endpoint
        run: |
          if grep -REn 'route\(\s*"/(mint|faucet|print|issue-credits|credits/(mint|grant)|balance/(add|set))' crates/ ; then
            echo "::error::Forbidden credit-minting HTTP route found. Credits are minted only by consensus (UptimeReward); no endpoint may create credits."
            exit 1
          fi
          echo "OK: no credit-minting endpoint."

      # GATE 3 — the capability verifier (ce-cap) must never import ce-ratio. Authorization is the
      # capability chain ALONE; share-ratio is app-tier policy that biases price/priority and must
      # not leak into the hard authz path. Rule documented in ce/docs/primitives.md (Design
      # invariants) and the ratio workstream's ce/docs/ratio.md.
      - name: Capability verifier does not import ce-ratio
        run: |
          if grep -REn 'ce[_-]ratio' crates/ce-cap/ ; then
            echo "::error::ce-cap (the capability verifier) must not depend on ce-ratio. Ratio is app-tier policy, never an authorization input."
            exit 1
          fi
          if grep -En 'ce[_-]ratio' crates/ce-cap/Cargo.toml ; then
            echo "::error::ce-cap/Cargo.toml must not declare a ce-ratio dependency."
            exit 1
          fi
          echo "OK: ce-cap does not import ce-ratio."

  # ── Release builds (tag pushes only) ───────────────────────────────────────

  build:
    name: Build ${{ matrix.name }}
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          - name: macos-amd64
            os: macos-13
            target: x86_64-apple-darwin
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: windows-amd64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/ce ce
          tar czf ce-${{ matrix.name }}.tar.gz ce
          rm ce

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item target\${{ matrix.target }}\release\ce.exe ce.exe
          Compress-Archive -Path ce.exe -DestinationPath ce-${{ matrix.name }}.zip
          Remove-Item ce.exe

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ce-${{ matrix.name }}
          path: ce-${{ matrix.name }}.tar.gz

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ce-${{ matrix.name }}
          path: ce-${{ matrix.name }}.zip

  # ── GitHub Release (after all builds succeed) ───────────────────────────────

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Checksums
        run: sha256sum ce-*.tar.gz ce-*.zip > sha256sums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ce-linux-amd64.tar.gz
            ce-linux-arm64.tar.gz
            ce-macos-amd64.tar.gz
            ce-macos-arm64.tar.gz
            ce-windows-amd64.zip
            sha256sums.txt
