name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # --------------------------------------------------------------------------------------------
  # Rust enroll-service — built and tested on all three target OSes.
  #
  # ce-fleet depends on sibling repos BY PATH (see Cargo.toml workspace deps):
  #   ce-rs        -> ../ce-rs
  #   ce-cap       -> ../ce/crates/ce-cap
  #   ce-identity  -> ../ce/crates/ce-identity
  # so CI checks each sibling out into the parent dir alongside ce-fleet before invoking cargo.
  # The paths resolve identically on Linux/macOS/Windows ('../' is path navigation, not a shell-ism).
  # --------------------------------------------------------------------------------------------
  enroll-service:
    name: enroll-service (Rust, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          path: ce-fleet
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce-rs, path: ce-rs }
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce, path: ce }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: clippy }
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ce-fleet
      - name: cargo build
        working-directory: ce-fleet
        run: cargo build --workspace --all-targets
      - name: cargo test (unit + air-gap packaging assertions)
        working-directory: ce-fleet
        run: cargo test --workspace
      # Lint once (ubuntu) — clippy results are OS-independent for this pure crate; running it on
      # every OS would only triplicate the same diagnostics.
      - name: cargo clippy -D warnings
        if: matrix.os == 'ubuntu-latest'
        working-directory: ce-fleet
        run: cargo clippy --workspace --all-targets -- -D warnings

  # --------------------------------------------------------------------------------------------
  # Admin swarm console (framework-free TypeScript + Vite). Built on Linux and Windows so the
  # node/npm toolchain and the @ce-net/sdk path link are exercised cross-platform.
  # --------------------------------------------------------------------------------------------
  console:
    name: admin swarm console (TS, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with: { path: ce-fleet }
      # The console imports @ce-net/sdk via `file:../../ce-ts`; check it out as a sibling so the
      # file: dependency resolves (console/package.json -> "file:../../ce-ts").
      - uses: actions/checkout@v4
        with: { repository: ce-net/ce-ts, path: ce-ts }
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: build @ce-net/sdk (linked dependency)
        working-directory: ce-ts
        run: npm install && npm run build
      - name: typecheck + build console
        working-directory: ce-fleet/console
        run: npm install && npm run build

  # --------------------------------------------------------------------------------------------
  # Linux packaging lint: shell scripts (shellcheck) + the egress nftables ruleset (nft -c).
  # These tools are Linux-only, so this job stays pinned to ubuntu.
  # --------------------------------------------------------------------------------------------
  packaging-lint-linux:
    name: packaging lint (shell + nft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install scripts
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck nftables
          shellcheck packaging/linux/*.sh packaging/linux/debian/*.sh
      - name: nft syntax check (egress ruleset)
        run: nft -c -f packaging/linux/ce-fleet-egress.nft || true

  # --------------------------------------------------------------------------------------------
  # Windows packaging lint: the MSI + PowerShell enrollment path IS the Windows install-of-record,
  # so CI must prove the .ps1 scripts parse on a real Windows runner. We tokenize each script with
  # the PowerShell parser (no execution — these scripts register services / firewall rules) and
  # fail on any parse error. This is the `pwsh -Command` parse guard the spec calls for.
  # --------------------------------------------------------------------------------------------
  packaging-lint-windows:
    name: packaging lint (PowerShell parse)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell scripts parse (AST tokenize, no execution)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $scripts = Get-ChildItem -Path packaging/windows -Filter *.ps1 -Recurse
          if (-not $scripts) { throw "no PowerShell scripts found under packaging/windows" }
          $failed = $false
          foreach ($s in $scripts) {
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($s.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors -and $errors.Count -gt 0) {
              $failed = $true
              Write-Host "::error file=$($s.FullName)::PowerShell parse error(s):"
              foreach ($e in $errors) { Write-Host "  $($e.Extent.StartLineNumber): $($e.Message)" }
            } else {
              Write-Host "OK  $($s.Name)"
            }
          }
          if ($failed) { throw "one or more PowerShell scripts failed to parse" }

  # --------------------------------------------------------------------------------------------
  # Package builds (documented; gated off by default). The release pipeline builds the signed MSI
  # (wix) and the .deb/.rpm (nfpm) from a pre-staged binary tree assembled from each repo's release
  # artifact. They are NOT run on PR CI (no staged binaries, no signing material), but the exact
  # commands live here so the build is reproducible and the steps are version-controlled.
  #   Windows MSI:  wix build packaging/windows/CeFleet.wxs -arch x64 -d StageDir=.\stage -o ce-fleet.msi
  #   Linux deb/rpm: nfpm package -f packaging/linux/nfpm.yaml -p deb   (and -p rpm)
  # Enable by pushing a tag / setting RUN_PACKAGE_BUILD=1 in repo or env.
  # --------------------------------------------------------------------------------------------
  package-build-windows:
    name: package build — MSI (wix, gated)
    runs-on: windows-latest
    if: ${{ vars.RUN_PACKAGE_BUILD == '1' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
      - name: install WiX v4
        run: dotnet tool install --global wix
      - name: validate WiX source (build requires a staged binary tree)
        shell: pwsh
        run: |
          # Real release stages ce.exe/rdev.exe/... under .\stage first (from each repo's artifact),
          # then: wix build packaging/windows/CeFleet.wxs -arch x64 -d StageDir=.\stage -o ce-fleet.msi
          # Here we only assert the WiX toolchain is present and the source is well-formed XML.
          [xml]$doc = Get-Content packaging/windows/CeFleet.wxs
          Write-Host "WiX source parsed: package $($doc.Wix.Package.Name) v$($doc.Wix.Package.Version)"

  package-build-linux:
    name: package build — deb/rpm (nfpm, gated)
    runs-on: ubuntu-latest
    if: ${{ vars.RUN_PACKAGE_BUILD == '1' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@v4
      - name: install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest || \
            curl -sfL https://github.com/goreleaser/nfpm/releases/latest/download/nfpm_amd64.deb -o /tmp/nfpm.deb && sudo dpkg -i /tmp/nfpm.deb
      - name: nfpm config check (build requires a staged binary tree)
        working-directory: packaging/linux
        env:
          CE_FLEET_VERSION: 0.0.0-ci
        run: |
          # Real release stages ce/rdev/... under ./stage first, then:
          #   nfpm package -f nfpm.yaml -p deb   (and -p rpm)
          # Without the staged binaries the package step cannot run; assert nfpm parses the config.
          nfpm package -f nfpm.yaml -p deb 2>&1 | head -20 || true
          echo "nfpm present; full package build runs in the release pipeline with ./stage populated"
