[package]
name = "drift-sim"
version = "0.1.0"
edition = "2021"
description = "Deterministic shared 2D ship-arena simulation: single source of truth for the authoritative host and client-side prediction."
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
bincode = "1.3"
serde = { version = "1", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
panic = "abort"
strip = true
codegen-units = 1
