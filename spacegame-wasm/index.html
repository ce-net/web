<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<!-- STRICT SAME-ORIGIN: the game talks to its authoritative backends ONLY over the CE mesh through this
     page's own origin (window.__ceNode if an in-browser WASM node is present, else the same-origin "/ce"
     proxy). connect-src 'self' makes any remote origin unreachable. wasm-unsafe-eval is required to
     instantiate the WebAssembly module. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'wasm-unsafe-eval'; base-uri 'none'" />
<title>spacegame — CE (wasm + wgpu)</title>
<meta name="theme-color" content="#03060e" />
<style>
  html,body{margin:0;height:100%;background:#03060e;color:#e9f1fb;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none}
  #cv{display:block;position:fixed;inset:0;width:100%;height:100%}
  #boot{position:fixed;inset:0;display:grid;place-items:center;z-index:5;pointer-events:none}
  #boot .b{font-family:ui-monospace,monospace;font-size:13px;color:#7af0ff;background:rgba(7,13,24,.8);
    border:1px solid rgba(116,176,255,.18);border-radius:10px;padding:10px 16px}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="boot"><div class="b" id="bootmsg">booting wasm + wgpu…</div></div>

<!-- The wasm-bindgen glue (emitted by `trunk`/`wasm-pack` into ./pkg/) boots the Rust frontend. -->
<script type="module">
  import init from "./pkg/spacegame_wasm.js";
  init().catch((e) => {
    const m = document.getElementById("bootmsg");
    if (m) m.textContent = "boot failed: " + (e && e.message ? e.message : e);
    console.error(e);
  });
</script>
</body>
</html>
