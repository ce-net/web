name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build+test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      # This repo path-depends on ../ce-rs and ../ce (ce-cap + ce-identity live in ce-net/ce).
      # Check this repo into ./ce-cache and the deps as siblings so the relative paths resolve.
      - name: Checkout ce-cache
        uses: actions/checkout@v4
        with:
          path: ce-cache

      - name: Checkout ce-rs (path dep)
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce-rs
          path: ce-rs

      - name: Checkout ce (ce-cap + ce-identity path deps)
        uses: actions/checkout@v4
        with:
          repository: ce-net/ce
          path: ce

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ce-cache

      - name: Build
        working-directory: ce-cache
        run: cargo build --verbose

      - name: Test
        working-directory: ce-cache
        run: cargo test --verbose
